<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>3D Rose Bloom UI</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: linear-gradient(135deg, #ffd6e8, #fff1b8);
  }
  canvas {
    display: block;
  }
</style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>
/* ================= SCENE ================= */
const scene = new THREE.Scene();

/* ================= CAMERA ================= */
const camera = new THREE.PerspectiveCamera(
  45,
  window.innerWidth / window.innerHeight,
  0.1,
  100
);
camera.position.set(0, 1.5, 8);

/* ================= RENDERER ================= */
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

/* ================= LIGHT ================= */
scene.add(new THREE.AmbientLight(0xffffff, 0.6));

const mainLight = new THREE.PointLight(0xff7aa2, 1.5, 20);
mainLight.position.set(5, 6, 5);
scene.add(mainLight);

/* ================= ROSE GROUP ================= */
const rose = new THREE.Group();
scene.add(rose);

/* ================= STEM ================= */
const stem = new THREE.Mesh(
  new THREE.CylinderGeometry(0.07, 0.1, 3.5),
  new THREE.MeshStandardMaterial({ color: 0x2ecc71 })
);
stem.position.y = -1.8;
rose.add(stem);

/* ================= LEAVES ================= */
function createLeaf(x, y, rot) {
  const leaf = new THREE.Mesh(
    new THREE.SphereGeometry(0.35, 32, 32),
    new THREE.MeshStandardMaterial({ color: 0x27ae60 })
  );
  leaf.scale.set(1.6, 0.6, 0.25);
  leaf.position.set(x, y, 0);
  leaf.rotation.z = rot;
  rose.add(leaf);
}

createLeaf(-0.8, -0.8, -0.5);
createLeaf(0.8, -0.2, 0.5);

/* ================= PETALS ================= */
const petals = [];
const petalMaterial = new THREE.MeshStandardMaterial({
  color: 0xff4d6d,
  roughness: 0.25,
  metalness: 0.3,
  emissive: 0xff5c8a,
  emissiveIntensity: 0.4
});

const PETAL_COUNT = 24;

for (let i = 0; i < PETAL_COUNT; i++) {
  const petal = new THREE.Mesh(
    new THREE.SphereGeometry(0.65, 32, 32),
    petalMaterial.clone()
  );

  petal.scale.set(0.01, 0.01, 0.01); // awal tertutup

  const angle = (i / PETAL_COUNT) * Math.PI * 2;
  petal.userData = {
    angle,
    targetScale: 1,
    opened: false,
    delay: i * 8 // delay mekar satu-satu
  };

  petal.position.set(
    Math.cos(angle) * 0.5,
    1.2,
    Math.sin(angle) * 0.5
  );

  petal.rotation.y = angle;
  petals.push(petal);
  rose.add(petal);
}

/* ================= INITIAL SCALE ================= */
rose.scale.set(0.05, 0.05, 0.05);

/* ================= ANIMATION ================= */
let grow = 0;
let frame = 0;

function animate() {
  requestAnimationFrame(animate);
  frame++;

  /* GROW ROSE */
  if (grow < 1) {
    grow += 0.012;
    rose.scale.setScalar(grow);
  }

  /* PETAL BLOOM ONE BY ONE */
  petals.forEach(petal => {
    if (frame > petal.userData.delay) {
      if (petal.scale.x < 1) {
        petal.scale.x += 0.03;
        petal.scale.y += 0.015;
        petal.scale.z += 0.02;

        // efek membuka
        petal.position.x = Math.cos(petal.userData.angle) * 0.9;
        petal.position.z = Math.sin(petal.userData.angle) * 0.9;
      }
    }
  });

  /* ELEGANT ROTATION */
  rose.rotation.y += 0.004;

  renderer.render(scene, camera);
}

animate();

/* ================= RESPONSIVE ================= */
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
